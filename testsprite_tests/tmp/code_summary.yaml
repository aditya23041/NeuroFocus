version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 14 (App Router)
  - React 18
  - TailwindCSS
  - Recharts
  - TensorFlow.js (COCO-SSD, BlazeFace)
  - localStorage (session persistence)
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Performance Analytics dashboard showing focus scores, weekly trends, distraction breakdowns, session history, achievements, and AI report modal
  - path: /setup
    file: src/app/setup/page.tsx
    auth_required: false
    description: Session setup page for configuring focus mode, duration, goal, and camera calibration before starting a study session
  - path: /monitor
    file: src/app/monitor/page.tsx
    auth_required: false
    description: Live AI monitor page with real-time webcam feed, COCO-SSD phone detection, BlazeFace face detection, countdown timer, focus score, and distraction alerts
features:
  - name: Analytics Dashboard
    description: Shows aggregated performance metrics from all study sessions stored in localStorage including avg focus score, weekly trend chart, distraction pie chart, streak tracker, and session history list
    files:
      - src/app/page.tsx
    entry_route: /
    user_interactions:
      - View weekly focus trend area chart
      - View distraction breakdown pie chart (Phone, Tab, Face)
      - View streak tracker showing last 7 days
      - Filter recent sessions by All, Work, or Study tabs
      - Click AI Report button to open the productivity report modal
      - Click Export CSV to download session data as CSV file
      - Click Export PDF to trigger browser print dialog
      - Close AI Report modal by clicking the close button
    api_calls: []
    auth_required: false

  - name: Session Setup
    description: Allows users to select a focus mode (Pomodoro 25m, Deep Work 90m, Custom), set a primary study goal text, adjust session duration via slider, test webcam camera, and start the session
    files:
      - src/app/setup/page.tsx
    entry_route: /setup
    user_interactions:
      - Click Pomodoro focus mode button
      - Click Deep Work focus mode button
      - Click Custom focus mode button
      - Type text into the Primary Goal input field
      - Drag the Session Duration range slider (15m to 180m)
      - Click Test Camera button to activate webcam
      - Click Stop Camera button to deactivate webcam
      - Click Start Session button to navigate to /monitor with query params
    api_calls: []
    auth_required: false

  - name: Live AI Monitor
    description: Real-time study monitoring using TensorFlow.js models (COCO-SSD for phone detection, BlazeFace for face detection), countdown timer, live focus score dial, distraction alerts, speech synthesis warnings, and session saving to localStorage
    files:
      - src/app/monitor/page.tsx
    entry_route: /monitor
    user_interactions:
      - View live webcam feed with AI bounding box overlays (face in green, phone in red)
      - View focus score dial with live percentage
      - View countdown timer
      - Click Pause/Resume button to toggle session timer
      - Click Reset button to restart session timer and stats
      - Click End & Save Session button to save session to localStorage and navigate to dashboard
      - Click Blur Feed / Reveal Feed toggle to enable/disable privacy mode
      - Click Set Reminder button to open reminder interval popup
      - Set reminder interval in minutes and click Confirm
      - Dismiss face sensor alert toast by clicking close
      - Dismiss phone distraction alert toast by clicking close
      - Dismiss tab switch alert toast by clicking close
      - Use Simulator Override HUD buttons to simulate face/phone/tab distraction states for testing
    api_calls: []
    auth_required: false

  - name: Achievement Badges
    description: Dynamic achievement badges on the analytics page that unlock based on study streak, focus score, and session data (Consistency King, Focus Master, Zero Distractions, Calibrated Mind, Night Owl)
    files:
      - src/app/page.tsx
    entry_route: /
    user_interactions:
      - View unlocked achievement badges with colored icons
      - View locked (greyed out) achievement badges
    api_calls: []
    auth_required: false

  - name: AI Productivity Report Modal
    description: A glassmorphic modal showing AI-generated cognitive performance analysis with avg focus index, total distracted time, streak status, cognitive trend analysis, distraction source breakdown, and personalized study recommendations
    files:
      - src/app/page.tsx
    entry_route: /
    user_interactions:
      - Click AI Report button to open the modal
      - Read AI cognitive trend analysis
      - Read distraction source breakdown
      - Read personalized study recommendations
      - Click Print Report button to trigger browser print
      - Click Close Report button to dismiss modal
    api_calls: []
    auth_required: false

known_limitations:
  - issue: Monitor page uses TensorFlow.js models loaded at runtime; tests requiring AI model inference may timeout or fail in headless browser environments
    location: src/app/monitor/page.tsx
    impact: COCO-SSD and BlazeFace model loading depends on network/CDN and may fail in test environments; focus score and distraction detection won't function without models
  - issue: Camera/webcam functionality requires browser permissions and hardware; tests cannot simulate real video streams
    location: src/app/setup/page.tsx, src/app/monitor/page.tsx
    impact: Camera-dependent features (live feed, bounding boxes) cannot be fully automated
  - issue: Simulator Override HUD on monitor page allows manual triggering of face/phone/tab distraction states for testing
    location: src/app/monitor/page.tsx
    impact: Can be used to test distraction alert UI without actual camera input
  - issue: Session data is persisted in localStorage only, no backend API
    location: src/app/page.tsx, src/app/monitor/page.tsx
    impact: Test environment must seed localStorage to test analytics data or rely on default sessions
